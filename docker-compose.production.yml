x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-ulimits: &default-ulimits
  nofile:
    soft: ${SCHOOLHUB_NOFILE_SOFT:-4096}
    hard: ${SCHOOLHUB_NOFILE_HARD:-8192}

services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolhub-postgres
    restart: unless-stopped
    logging: *default-logging
    command:
      - postgres
      - "-c"
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-768MB}
      - "-c"
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-5GB}
      - "-c"
      - work_mem=${POSTGRES_WORK_MEM:-8MB}
      - "-c"
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
      - "-c"
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-80}
      - "-c"
      - checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - "-c"
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-1GB}
      - "-c"
      - min_wal_size=${POSTGRES_MIN_WAL_SIZE:-128MB}
      - "-c"
      - wal_compression=${POSTGRES_WAL_COMPRESSION:-on}
      - "-c"
      - random_page_cost=${POSTGRES_RANDOM_PAGE_COST:-2.0}
      - "-c"
      - effective_io_concurrency=${POSTGRES_EFFECTIVE_IO_CONCURRENCY:-2}
      - "-c"
      - fsync=on
      - "-c"
      - full_page_writes=on
      - "-c"
      - synchronous_commit=on
    shm_size: ${POSTGRES_SHM_SIZE:-256m}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-256}
    mem_limit: ${POSTGRES_MEM_LIMIT:-3072m}
    cpus: ${POSTGRES_CPUS:-1.0}
    stop_grace_period: 60s
    ulimits: *default-ulimits
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schoolhub-redis
    restart: unless-stopped
    logging: *default-logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --auto-aof-rewrite-percentage
      - ${REDIS_AUTO_AOF_REWRITE_PERCENTAGE:-100}
      - --auto-aof-rewrite-min-size
      - ${REDIS_AUTO_AOF_REWRITE_MIN_SIZE:-64mb}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - noeviction
      - --tcp-keepalive
      - "60"
      - --timeout
      - "0"
    pids_limit: ${REDIS_PIDS_LIMIT:-128}
    mem_limit: ${REDIS_MEM_LIMIT:-640m}
    cpus: ${REDIS_CPUS:-0.25}
    stop_grace_period: 30s
    ulimits: *default-ulimits
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: schoolhub-api:${SCHOOLHUB_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "no"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    pids_limit: ${MIGRATE_PIDS_LIMIT:-256}
    mem_limit: ${MIGRATE_MEM_LIMIT:-1024m}
    cpus: ${MIGRATE_CPUS:-1.0}
    ulimits: *default-ulimits
    logging: *default-logging
    command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy", "--schema", "prisma/schema.prisma"]
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=${MIGRATE_NODE_MAX_OLD_SPACE_MB:-512}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: schoolhub-api:${SCHOOLHUB_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    pids_limit: ${API_PIDS_LIMIT:-384}
    mem_limit: ${API_MEM_LIMIT:-1536m}
    cpus: ${API_CPUS:-1.35}
    stop_grace_period: 30s
    ulimits: *default-ulimits
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV}
      NODE_OPTIONS: --max-old-space-size=${API_NODE_MAX_OLD_SPACE_MB:-1024}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-schoolhub-ehadir}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-schoolhub-web}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-28800000}
      REFRESH_TTL_MS: ${REFRESH_TTL_MS:-604800000}
      WORKER_TOKEN: ${WORKER_TOKEN}
      READER_SECRET_ENCRYPTION_KEY: ${READER_SECRET_ENCRYPTION_KEY:-}
      READER_API_KEY_HASH_SECRET: ${READER_API_KEY_HASH_SECRET:-}
      READER_SIGNATURE_SKEW_MS: ${READER_SIGNATURE_SKEW_MS:-120000}
      READER_NONCE_TTL_MS: ${READER_NONCE_TTL_MS:-300000}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:-}
      SCHOOL_TIMEZONE: ${SCHOOL_TIMEZONE:-Asia/Jakarta}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-loopback,linklocal,uniquelocal}
      SSO_ENABLED: ${SSO_ENABLED:-false}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_CLIENT_SECRET: ${WORKOS_CLIENT_SECRET:-}
      WORKOS_ISSUER: ${WORKOS_ISSUER:-}
      WORKOS_AUDIENCE: ${WORKOS_AUDIENCE:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-}
      STEP_UP_FOR_POLICY: ${STEP_UP_FOR_POLICY:-true}
      STEP_UP_FOR_READER_ROTATE: ${STEP_UP_FOR_READER_ROTATE:-true}
      MIN_GATE_STAY_MINUTES: ${MIN_GATE_STAY_MINUTES:-10}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin.tu}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Admin TU}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-}
      DEVELOPER_BOOTSTRAP_ENABLED: ${DEVELOPER_BOOTSTRAP_ENABLED:-false}
      DEVELOPER_USERNAME: ${DEVELOPER_USERNAME:-developer}
      DEVELOPER_PASSWORD: ${DEVELOPER_PASSWORD:-}
      DEVELOPER_FULL_NAME: ${DEVELOPER_FULL_NAME:-Developer Sistem}
      ANDROID_APK_STORAGE_DIR: ${ANDROID_APK_STORAGE_DIR:-/app/uploads/android-apk-releases}
      ANDROID_APK_MAX_BYTES: ${ANDROID_APK_MAX_BYTES:-157286400}
      PORT: 3000
    volumes:
      - android_apk_releases:/app/uploads/android-apk-releases
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://127.0.0.1:3000/api/v1/health/live\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))'"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    image: schoolhub-worker:${SCHOOLHUB_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: schoolhub-worker
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    pids_limit: ${WORKER_PIDS_LIMIT:-256}
    mem_limit: ${WORKER_MEM_LIMIT:-768m}
    cpus: ${WORKER_CPUS:-0.55}
    stop_grace_period: 30s
    ulimits: *default-ulimits
    logging: *default-logging
    environment:
      NODE_OPTIONS: --max-old-space-size=${WORKER_NODE_MAX_OLD_SPACE_MB:-512}
      API_RECONCILE_URL: http://api:3000/api/v1/internal/reconciliation/run
      API_MARK_MISSED_URL: http://api:3000/api/v1/internal/sessions/mark-missed
      WORKER_TOKEN: ${WORKER_TOKEN}
      WORKER_INTERVAL_MS: ${WORKER_INTERVAL_MS}
      WORKER_RECONCILE_INTERVAL_MS: ${WORKER_RECONCILE_INTERVAL_MS:-30000}
      WORKER_AUTO_MISSED_INTERVAL_MS: ${WORKER_AUTO_MISSED_INTERVAL_MS:-15000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      WORKER_JOB_ATTEMPTS: ${WORKER_JOB_ATTEMPTS:-5}
      WORKER_MAX_CONSECUTIVE_FAILURES: ${WORKER_MAX_CONSECUTIVE_FAILURES:-5}
      WORKER_STALE_HEALTH_MS: ${WORKER_HEALTH_STALE_MS:-180000}
      WORKER_HEALTH_STALE_MS: ${WORKER_HEALTH_STALE_MS:-180000}
      WORKER_HEALTH_FILE: /tmp/schoolhub-worker-health.json
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'const fs=require(\"fs\"); const file=process.env.WORKER_HEALTH_FILE||\"/tmp/schoolhub-worker-health.json\"; const stale=Number(process.env.WORKER_HEALTH_STALE_MS||\"180000\"); const data=JSON.parse(fs.readFileSync(file,\"utf8\")); const now=Date.now(); for (const name of [\"auto-missed\",\"reconciliation\"]) { const job=data.jobs&&data.jobs[name]; if (!job||!job.lastSuccessAt||now-Date.parse(job.lastSuccessAt)>stale) process.exit(1); }'" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  web:
    image: schoolhub-web:${SCHOOLHUB_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: schoolhub-web
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=16m
      - /tmp:size=32m,mode=1777
    pids_limit: ${WEB_PIDS_LIMIT:-128}
    mem_limit: ${WEB_MEM_LIMIT:-256m}
    cpus: ${WEB_CPUS:-0.15}
    stop_grace_period: 20s
    ulimits: *default-ulimits
    logging: *default-logging
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5

  reverse-proxy:
    image: nginxinc/nginx-unprivileged:1.29-alpine
    container_name: schoolhub-nginx
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=16m
      - /tmp:size=32m,mode=1777
    pids_limit: ${REVERSE_PROXY_PIDS_LIMIT:-128}
    mem_limit: ${REVERSE_PROXY_MEM_LIMIT:-256m}
    cpus: ${REVERSE_PROXY_CPUS:-0.2}
    stop_grace_period: 20s
    ulimits: *default-ulimits
    logging: *default-logging
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ./ops/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  android_apk_releases:
