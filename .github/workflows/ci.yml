name: CI

on:
  pull_request:
  push:
    branches: [main, fix/**]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schoolhub_test
          POSTGRES_USER: schoolhub
          POSTGRES_PASSWORD: schoolhub_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schoolhub -d schoolhub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://schoolhub:schoolhub_test_password@localhost:5432/schoolhub_test?schema=public
      DIRECT_URL: postgresql://schoolhub:schoolhub_test_password@localhost:5432/schoolhub_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-random-looking-secret-value-with-more-than-forty-eight-characters
      JWT_ISSUER: schoolhub-ci
      JWT_AUDIENCE: schoolhub-web-ci
      JWT_EXPIRES_IN: 15m
      WORKER_TOKEN: ci-worker-token-with-more-than-thirty-two-characters
      READER_SECRET_ENCRYPTION_KEY: ci-reader-secret-with-more-than-thirty-two-characters
      CORS_ORIGIN: http://localhost:5173
      PUBLIC_APP_ORIGIN: http://localhost:5173
      WORKER_INTERVAL_MS: 15000
      SCHOOL_TIMEZONE: Asia/Jakarta
      SSO_ENABLED: 'false'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20.20.2'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json
            apps/worker/package-lock.json
      - run: npm ci
      - run: npm ci --prefix apps/api
      - run: npm ci --prefix apps/web
      - run: npm ci --prefix apps/worker
      - run: npx prisma format --schema prisma/schema.prisma
      - run: git diff --exit-code prisma/schema.prisma
      - run: npx prisma validate --schema prisma/schema.prisma
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy --schema prisma/schema.prisma
      - run: npm run audit:preflight-chain -- --json=artifacts/audit/audit-chain-preflight-after-migrate.json
      - run: npm run audit:verify-chain
      - run: npm run typecheck:all
      - run: npm run lint:all
      - run: npm run lint --prefix apps/worker
      - run: npm run test:api
      - run: npm run test:web
      - run: npm run audit:preflight-chain -- --json=artifacts/audit/audit-chain-preflight-after-unit-tests.json
      - run: npm run audit:verify-chain
      - run: npx --prefix apps/web playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-artifacts
          if-no-files-found: ignore
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
            artifacts/audit/
      - run: npm run build:all
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high --prefix apps/api
      - run: npm audit --audit-level=high --prefix apps/web
      - run: npm audit --audit-level=high --prefix apps/worker

  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Validate Gradle wrapper
        run: |
          test -x apps/android-reader/gradlew
          grep -q 'https\\://services.gradle.org/distributions/gradle-8.7-bin.zip' apps/android-reader/gradle/wrapper/gradle-wrapper.properties
      - name: Android static security, lint, tests, and debug build
        run: bash scripts/android_release_security.sh
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-reader-reports
          if-no-files-found: ignore
          path: |
            apps/android-reader/app/build/reports/
            apps/android-reader/app/build/test-results/
            artifacts/android-security/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-reader-debug-apk
          if-no-files-found: error
          path: apps/android-reader/app/build/outputs/apk/debug/*.apk

  docker:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      POSTGRES_DB: schoolhub
      POSTGRES_USER: schoolhub
      POSTGRES_PASSWORD: ci-compose-password
      DATABASE_URL: postgresql://schoolhub:ci-compose-password@postgres:5432/schoolhub?schema=public
      DIRECT_URL: postgresql://schoolhub:ci-compose-password@postgres:5432/schoolhub?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ci-only-random-looking-secret-value-with-more-than-forty-eight-characters
      JWT_ISSUER: schoolhub-ci
      JWT_AUDIENCE: schoolhub-web-ci
      JWT_EXPIRES_IN: 15m
      WORKER_TOKEN: ci-worker-token-with-more-than-thirty-two-characters
      READER_SECRET_ENCRYPTION_KEY: ci-reader-secret-with-more-than-thirty-two-characters
      CORS_ORIGIN: https://example.invalid
      PUBLIC_APP_ORIGIN: https://example.invalid
      WORKER_INTERVAL_MS: 15000
      SCHOOL_TIMEZONE: Asia/Jakarta
      SSO_ENABLED: 'false'
      ADMIN_BOOTSTRAP_ENABLED: 'true'
      ADMIN_USERNAME: admin.tu
      ADMIN_PASSWORD: TestFixtureAdminValue-123!
      ADMIN_FULL_NAME: Admin TU
      DEFAULT_USER_PASSWORD: TestFixtureUserValue-123!
      DEVELOPER_BOOTSTRAP_ENABLED: 'false'
      DEVELOPER_PASSWORD: TestFixtureDeveloperValue-123!
      BACKUP_ENCRYPTION_PASSPHRASE: test-fixture-backup-passphrase-change-me-not-production
      BACKUP_DIR: artifacts/docker-backups
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Prepare CI production test env fixture
        run: |
          cp .env.production.test.example .env.production.test
          chmod 600 .env.production.test
      - run: docker compose -f docker-compose.production.yml config
      - run: docker compose -f docker-compose.production.yml build
      - run: docker compose -f docker-compose.production.yml up -d
      - run: |
          for i in {1..30}; do
            curl --fail http://localhost/health/live && curl --fail http://localhost/health/ready && exit 0
            sleep 5
          done
          mkdir -p docker-diagnostics
          docker compose -f docker-compose.production.yml ps > docker-diagnostics/compose-ps.txt || true
          docker compose -f docker-compose.production.yml logs --no-color > docker-diagnostics/compose-logs.txt || true
          exit 1
      - run: docker compose -f docker-compose.production.yml run --rm --no-deps api node dist/scripts/ensure-admin.js
      - run: |
          mkdir -p artifacts/perf
          BENCH_BASE_URL=http://localhost BENCH_OUTPUT=artifacts/perf/docker-http-low-rate.json node scripts/low_rate_http_benchmark.mjs
      - run: |
          mkdir -p artifacts/docker-backups
          backup_json=$(bash scripts/backup_production.sh .env.production.test --reason ci-docker)
          backup_path=$(jq -r '.path' <<< "$backup_json")
          bash scripts/verify_backup.sh --env-file .env.production.test --backup "$backup_path"
      - if: always()
        run: |
          mkdir -p docker-diagnostics
          docker compose -f docker-compose.production.yml ps > docker-diagnostics/compose-ps.txt || true
          docker compose -f docker-compose.production.yml logs --no-color > docker-diagnostics/compose-logs.txt || true
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docker-diagnostics
          if-no-files-found: ignore
          path: |
            docker-diagnostics/
            artifacts/perf/
      - if: always()
        run: docker compose -f docker-compose.production.yml down -v


  deployment-regression:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20.20.2'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Prepare CI production test env fixture
        run: |
          cp .env.production.test.example .env.production.test
          chmod 600 .env.production.test
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: ShellCheck production scripts
        run: |
          shellcheck \
            scripts/deploy_production.sh \
            scripts/rollback_production.sh \
            scripts/deployment_status.sh \
            scripts/bootstrap_ubuntu_24_04.sh \
            scripts/uat_smoke.sh \
            scripts/public_https_smoke.sh \
            scripts/post_deploy_smoke.sh \
            scripts/test_post_deploy_smoke.sh \
            scripts/https_smoke.sh \
            scripts/https_ci_fixture.sh \
            scripts/backup_production.sh \
            scripts/verify_backup.sh \
            scripts/restore_backup.sh \
            scripts/profile_vps_capacity.sh \
            scripts/validate_vps_tuning.sh
      - name: Compose validation for VPS topology and resource budget
        run: |
          docker compose -f docker-compose.production.yml -f docker-compose.vps.yml --env-file .env.production.test config > artifacts-vps-compose.yml
          docker compose -f docker-compose.production.yml -f docker-compose.vps.yml --env-file .env.production.test config --format json > artifacts-vps-compose.json
          grep -q '127.0.0.1' artifacts-vps-compose.yml
          grep -Eq '^[[:space:]]*published: "?8080"?[[:space:]]*$' artifacts-vps-compose.yml
          ! grep -Eq '^[[:space:]]*published: "?80"?[[:space:]]*$' artifacts-vps-compose.yml
          node scripts/validate_compose_resources.mjs artifacts-vps-compose.json
          bash scripts/validate_vps_tuning.sh
      - name: Deployment dry-run and evidence schema
        run: |
          chmod 600 .env.production.test
          bash scripts/deploy_production.sh .env.production.test --dry-run
          evidence=$(find artifacts/deployments -path '*/deployment-evidence.json' -type f | head -n 1)
          node scripts/validate_deployment_evidence.mjs "$evidence"
      - name: Deployment scripts fail closed on insecure env permissions
        run: |
          cp .env.production.test /tmp/schoolhub-insecure.env
          chmod 644 /tmp/schoolhub-insecure.env
          if bash scripts/deploy_production.sh /tmp/schoolhub-insecure.env --dry-run; then
            echo 'deploy dry-run unexpectedly accepted group/world-readable env file' >&2
            exit 1
          fi
      - name: Rollback dry-run
        run: bash scripts/rollback_production.sh --env-file .env.production.test --target-sha "$GITHUB_SHA" --dry-run
      - name: Post-deploy smoke fixture
        run: npm run test:post-deploy-smoke
      - name: UAT script has no legacy browser token dependency and uses geolocation contract
        run: |
          ! grep -R -E 'accessToken|Authorization: Bearer|authorization: Bearer' scripts/uat_smoke.sh scripts/post_deploy_smoke.sh
          grep -q 'accuracyMeter' scripts/uat_smoke.sh
          grep -q 'browser_geolocation' scripts/uat_smoke.sh
          ! grep -R -E '"lat"|"lng"' scripts/uat_smoke.sh
      - name: Secret-like files are not tracked and are ignored
        run: |
          ! git ls-files | grep -E '(^|/)(\.env|.*\.pem|.*\.key|.*\.dump|.*\.dump\.enc|.*backup.*\.sql\.gz|.*credentials.*\.json)$'
          git check-ignore .env .env.local absensissh.pem private.key backup.dump.enc generated-credentials.json

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357

  postgres-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schoolhub_test
          POSTGRES_USER: schoolhub
          POSTGRES_PASSWORD: schoolhub_test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U schoolhub -d schoolhub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://schoolhub:schoolhub_test_password@localhost:5432/schoolhub_test?schema=public
      DIRECT_URL: postgresql://schoolhub:schoolhub_test_password@localhost:5432/schoolhub_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-random-looking-secret-value-with-more-than-forty-eight-characters
      JWT_ISSUER: schoolhub-ci
      JWT_AUDIENCE: schoolhub-web-ci
      WORKER_TOKEN: ci-worker-token-with-more-than-thirty-two-characters
      READER_SECRET_ENCRYPTION_KEY: ci-reader-secret-with-more-than-thirty-two-characters
      SCHOOL_TIMEZONE: Asia/Jakarta
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20.20.2'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json
            apps/worker/package-lock.json
      - run: npm ci && npm ci --prefix apps/api && npm ci --prefix apps/web && npm ci --prefix apps/worker
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy --schema prisma/schema.prisma
      - run: npm run preflight:production -- --json=artifacts/preflight/production-readiness-preflight.json
      - run: npm run test:integration -- --json=artifacts/integration/postgres-integration.json
      - run: npm run test:concurrency -- --json=artifacts/concurrency/postgres-concurrency.json
      - run: npm run test:outbox-sse -- --json=artifacts/outbox-sse/outbox-sse-distributed.json
      - run: npm run audit:preflight-chain -- --json=artifacts/audit/audit-chain-preflight-after-concurrency.json
      - run: npm run audit:verify-chain
      - run: npm run verify:post-migration -- --json=artifacts/preflight/post-migration-verify.json
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: postgres-integration-artifacts
          if-no-files-found: ignore
          path: artifacts/

  upgrade-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schoolhub_upgrade
          POSTGRES_USER: schoolhub
          POSTGRES_PASSWORD: schoolhub_test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U schoolhub -d schoolhub_upgrade"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: 'true'
      NODE_ENV: test
      DATABASE_URL: postgresql://schoolhub:schoolhub_test_password@localhost:5432/schoolhub_upgrade?schema=public
      DIRECT_URL: postgresql://schoolhub:schoolhub_test_password@localhost:5432/schoolhub_upgrade?schema=public
      JWT_SECRET: ci-only-random-looking-secret-value-with-more-than-forty-eight-characters
      WORKER_TOKEN: ci-worker-token-with-more-than-thirty-two-characters
      READER_SECRET_ENCRYPTION_KEY: ci-reader-secret-with-more-than-thirty-two-characters
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20.20.2'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:upgrade-migrations
      - name: Run audit trust-boundary local database integration
        env:
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: schoolhub
          PGPASSWORD: schoolhub_test_password
        run: |
          psql -d postgres -v ON_ERROR_STOP=1 \
            -c 'DROP DATABASE IF EXISTS schoolhub_audit_boundary_ci WITH (FORCE);' \
            -c 'CREATE DATABASE schoolhub_audit_boundary_ci;'
          AUDIT_BOUNDARY_TEST_DATABASE_URL='postgresql://schoolhub:schoolhub_test_password@127.0.0.1:5432/schoolhub_audit_boundary_ci' \
          AUDIT_BOUNDARY_TEST_CONFIRM='RUN_LOCAL_DESTRUCTIVE_TEST' \
          npm run test:audit-trust-boundary:local
          node -e "const report=require('./artifacts/integration/audit-trust-boundary-local.json'); if (report.status !== 'PASS' || report.executed !== true || report.failCount !== 0) process.exit(1);"
      - if: always()
        name: Clean up audit trust-boundary local database
        env:
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGUSER: schoolhub
          PGPASSWORD: schoolhub_test_password
        run: psql -d postgres -c 'DROP DATABASE IF EXISTS schoolhub_audit_boundary_ci WITH (FORCE);' || true
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: upgrade-migration-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/upgrade-migrations/
            artifacts/integration/audit-trust-boundary-local.json

  security-supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20.20.2'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json
            apps/worker/package-lock.json
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: npm ci && npm ci --prefix apps/api && npm ci --prefix apps/web && npm ci --prefix apps/worker
      - run: npm run security:secrets
      - run: npm run security:license
      - run: npm run security:risk-acceptance
      - run: npm run security:sbom
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high --prefix apps/api
      - run: npm audit --audit-level=high --prefix apps/web
      - run: npm audit --audit-level=high --prefix apps/worker
      - run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
      - run: npm run security:container-scan
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-supply-chain-artifacts
          if-no-files-found: ignore
          path: artifacts/

  web-quality-gates:
