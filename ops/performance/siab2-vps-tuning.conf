# SIAB2 dedicated VPS host tuning proposal.
# This file is a review artifact only. It is not applied by Docker Compose and is not
# applied by default by scripts/validate_vps_tuning.sh.
#
# Format:
# kind|key|current_observed|proposed|rollback|validation_command|reason
#
# Every setting below records the observed read-only value from the dedicated VPS
# profile collected on 2026-06-17. Re-check current values immediately before any
# owner-approved host-level apply.

sysctl|fs.file-max|9223372036854775807|9223372036854775807|9223372036854775807|sysctl -n fs.file-max|Already effectively unlimited on this VPS; retain rather than lower global file ceiling.
sysctl|net.core.somaxconn|4096|4096|4096|sysctl -n net.core.somaxconn|Accept backlog is already sufficient for Nginx/Caddy bursts; retain safe current value.
sysctl|net.ipv4.tcp_max_syn_backlog|512|4096|512|sysctl -n net.ipv4.tcp_max_syn_backlog|Raise SYN backlog to match somaxconn for short school login/scan bursts without weakening rate limits.
sysctl|vm.swappiness|10|10|10|sysctl -n vm.swappiness|Already low; retain to avoid normal workload swapping while keeping swap available for emergencies.
sysctl|vm.dirty_background_ratio|10|5|10|sysctl -n vm.dirty_background_ratio|Start writeback earlier on the virtual block device to reduce latency spikes during backup/AOF activity.
sysctl|vm.dirty_ratio|20|15|20|sysctl -n vm.dirty_ratio|Bound dirty page accumulation so PostgreSQL and Redis persistence avoid long write stalls.
sysctl|vm.overcommit_memory|0|0|0|sysctl -n vm.overcommit_memory|Retain kernel heuristic overcommit; Redis has bounded memory and host reserve, so no unsafe blanket overcommit change.
compose-env|SCHOOLHUB_NOFILE_SOFT|4096|4096|4096|docker compose config|Compose already sets per-container nofile soft limit; retain for app containers.
compose-env|SCHOOLHUB_NOFILE_HARD|8192|8192|8192|docker compose config|Compose already sets per-container nofile hard limit; retain for app containers.
docker-logging|json-file|json-file with max-size=10m max-file=5|json-file with max-size=10m max-file=5|json-file|docker info --format '{{.LoggingDriver}}'|Compose service logging already rotates JSON logs; retain to protect disk without losing recent diagnostics.
