# ============================================================
# SchoolHub e-Hadir — API-only Nginx Config
# ============================================================
# Digunakan ketika frontend di-host di Vercel.
# Nginx hanya proxy request ke backend NestJS.
# ============================================================

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

map $http_x_forwarded_for $schoolhub_rate_key {
    default $http_x_forwarded_for;
    "" $binary_remote_addr;
}

limit_req_zone $schoolhub_rate_key zone=login_limit:10m rate=10r/m;
limit_req_zone $schoolhub_rate_key zone=api_limit:20m rate=20r/s;
limit_req_zone $schoolhub_rate_key zone=scan_limit:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    keepalive_timeout 65s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Block internal endpoints
    location ^~ /api/v1/internal/ {
        return 404;
    }

    # Login endpoint — rate limited
    location = /api/v1/auth/login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://api:3000/api/v1/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE live monitor stream
    location = /api/v1/reports/live-monitor/stream {
        proxy_pass http://api:3000/api/v1/reports/live-monitor/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Scan endpoints — rate limited
    location ~ ^/api/v1/attendance/(reader-scan|qr-reader-scan|qr-scan|gate/tap)$ {
        limit_req zone=scan_limit burst=20 nodelay;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    # All other API endpoints
    location /api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    # Health checks
    location /health/live {
        proxy_pass http://api:3000/api/v1/health/live;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    location /health/ready {
        proxy_pass http://api:3000/api/v1/health/ready;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    # Root — return API info
    location = / {
        default_type application/json;
        return 200 '{"service":"SchoolHub e-Hadir API","status":"running","docs":"/api/v1/health/ready"}';
    }

    # Block everything else
    location / {
        return 404 '{"error":"Not found","message":"Frontend is hosted on Vercel"}';
    }
}
